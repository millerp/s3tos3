name: Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      force:
        description: Forçar release da versão atual do package.json (ignora semantic-release)
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    name: Semantic Release
    if: github.event_name == 'push' && github.ref_type == 'branch' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Executar semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  resolve-manual:
    name: Resolver versão (manual)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag')
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.meta.outputs.published }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determinar versão
        id: meta
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "published=true" >> "$GITHUB_OUTPUT"
          elif [[ "${FORCE}" == "true" ]]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: [semantic-release, resolve-manual]
    if: >-
      ${{ always() && !cancelled() && (
        (needs.semantic-release.result == 'success' && needs.semantic-release.outputs.published == 'true') ||
        (needs.resolve-manual.result == 'success' && needs.resolve-manual.outputs.published == 'true')
      ) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
            artifact: |
              release/*Setup*.exe
              release/*Setup*.exe.blockmap
          - os: macos-latest
            name: macOS
            args: --mac
            artifact: |
              release/*.dmg
              release/*-mac.zip
          - os: ubuntu-latest
            name: Linux
            args: --linux
            artifact: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Resolver versão do release
        id: rel
        run: |
          if [[ "${{ needs.semantic-release.outputs.published }}" == "true" ]]; then
            echo "version=${{ needs.semantic-release.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "manual=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.resolve-manual.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "manual=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ steps.rel.outputs.version }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:app

      - name: Package (${{ matrix.name }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: s3tos3-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publicar artefatos no GitHub Release
    needs: [semantic-release, resolve-manual, build]
    if: >-
      ${{ always() && !cancelled() && needs.build.result == 'success' && (
        (needs.semantic-release.result == 'success' && needs.semantic-release.outputs.published == 'true') ||
        (needs.resolve-manual.result == 'success' && needs.resolve-manual.outputs.published == 'true')
      ) }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolver versão do release
        id: rel
        run: |
          if [[ "${{ needs.semantic-release.outputs.published }}" == "true" ]]; then
            echo "version=${{ needs.semantic-release.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "manual=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.resolve-manual.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "manual=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Preparar instaladores
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*Setup*.exe' -o \
            -name '*.exe.blockmap' -o \
            -name '*.dmg' -o \
            -name '*-mac.zip' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
          \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Criar release (somente manual sem tag prévia)
        if: steps.rel.outputs.manual == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rel.outputs.version }}
          name: S3 to S3 v${{ steps.rel.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
          draft: false
          prerelease: false
          overwrite_files: true

      - name: Anexar instaladores ao release existente
        if: steps.rel.outputs.manual != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: gh release upload "v${VERSION}" release-assets/* --clobber
